<style>

/* ========================= */
/* RESET */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

/* ========================= */
/* BODY */
/* ========================= */

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    user-select:none;
    background:black;
    perspective:1400px;
}

/* ========================= */
/* BACKGROUND VIDEO */
/* ========================= */

#bg-video{
    position:fixed;
    right:0;
    bottom:0;
    min-width:100%;
    min-height:100%;
    object-fit:cover;
    z-index:-3;
}

/* ========================= */
/* DARK OVERLAY */
/* ========================= */

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(
        135deg,
        rgba(0,0,0,0.6),
        rgba(0,0,0,0.35)
    );
    z-index:-2;
}

/* ========================= */
/* MAIN CONTAINER */
/* ========================= */

.container{

    position:relative;

    width:90%;
    max-width:950px;

    padding:35px;

    border-radius:28px;

    overflow:hidden;

    transform-style:preserve-3d;

    backdrop-filter:blur(18px);

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,0.09),
        rgba(255,255,255,0.03)
    );

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
        0 25px 45px rgba(0,0,0,0.4),
        0 0 40px rgba(0,255,255,0.08);

    transition:
        transform 0.12s linear,
        box-shadow 0.3s ease;

    max-height:90vh;
    overflow-y:auto;
}

/* Glass Reflection */

.container::before{

    content:"";

    position:absolute;

    top:-50%;
    left:-50%;

    width:200%;
    height:200%;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.08),
        transparent
    );

    transform:rotate(25deg);

    pointer-events:none;
}

/* ========================= */
/* FLOATING ORBS */
/* ========================= */

.floating-orb{
    position:absolute;
    border-radius:50%;
    filter:blur(20px);
    opacity:0.6;
    z-index:-1;
    animation:floatOrb 8s ease-in-out infinite;
}

.orb1{
    width:220px;
    height:220px;
    background:#00e5ff;
    top:-80px;
    left:-80px;
}

.orb2{
    width:180px;
    height:180px;
    background:#ff00ff;
    bottom:-60px;
    right:-60px;
    animation-delay:2s;
}

.orb3{
    width:140px;
    height:140px;
    background:#00ff99;
    top:40%;
    right:-50px;
    animation-delay:4s;
}

@keyframes floatOrb{

    0%{
        transform:
        translateY(0px)
        translateX(0px)
        scale(1);
    }

    50%{
        transform:
        translateY(-30px)
        translateX(20px)
        scale(1.08);
    }

    100%{
        transform:
        translateY(0px)
        translateX(0px)
        scale(1);
    }

}

/* ========================= */
/* TITLE */
/* ========================= */

h1{

    color:#FFFFFF;

    margin-bottom:25px;

    letter-spacing:1px;

    text-align:center;

    text-shadow:
        0 0 10px rgba(255,0,0,0.7),
        0 0 25px rgba(255,0,0,0.4);

    animation:titleGlow 2s ease-in-out infinite alternate;
}

@keyframes titleGlow{

    from{
        text-shadow:
            0 0 10px rgba(255,0,0,0.5),
            0 0 20px rgba(255,0,0,0.3);
    }

    to{
        text-shadow:
            0 0 18px rgba(255,0,0,0.9),
            0 0 35px rgba(255,0,0,0.6);
    }

}

/* ========================= */
/* CARD */
/* ========================= */

.card{

    position:relative;

    margin:18px 0;

    padding:22px;

    border-radius:20px;

    overflow:hidden;

    display:flex;

    justify-content:space-between;

    align-items:center;

    transform-style:preserve-3d;

    transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;

    border:
    1px solid rgba(255,255,255,0.08);

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,0.12),
        rgba(255,255,255,0.04)
    );
}

/* Hover */

.card:hover{

    transform:
        rotateX(8deg)
        rotateY(-8deg)
        translateY(-8px)
        scale(1.02);

    box-shadow:
        0 25px 45px rgba(0,255,255,0.2),
        0 0 20px rgba(255,255,255,0.08);

}

/* Shine Effect */

.card::before{

    content:"";

    position:absolute;

    top:-120%;
    left:-50%;

    width:60%;
    height:300%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.15),
        transparent
    );

    transform:rotate(25deg);

    transition:0.7s;
}

.card:hover::before{
    left:130%;
}

/* ========================= */
/* CARD TEXT */
/* ========================= */

.card h2{
    color:white;
    font-size:18px;
}

/* ========================= */
/* BUTTON */
/* ========================= */

.btn{

    position:relative;

    overflow:hidden;

    padding:12px 24px;

    border-radius:30px;

    border:none;

    cursor:pointer;

    color:white;

    font-weight:bold;

    background:
    linear-gradient(
        45deg,
        #4facfe,
        #00f2fe
    );

    transform-style:preserve-3d;

    transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
}

/* Hover */

.btn:hover{

    transform:
        translateZ(30px)
        scale(1.08);

    box-shadow:
        0 0 25px rgba(0,255,255,0.9);
}

/* Shine */

.btn::before{

    content:"";

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
    );

    transition:0.5s;
}

.btn:hover::before{
    left:120%;
}

/* ========================= */
/* CLOCK */
/* ========================= */

.datetime-box{

    position:fixed;

    left:20px;
    top:50%;

    transform:translateY(-50%);

    width:220px;

    padding:18px;

    border-radius:18px;

    background:
    rgba(0,0,0,0.45);

    backdrop-filter:blur(12px);

    color:#00ffcc;

    box-shadow:
    0 0 20px rgba(0,255,255,0.3);

    border:
    1px solid rgba(255,255,255,0.1);

    z-index:9999;

    text-align:center;
}

#digital-clock{
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
}

#digital-date{
    margin-top:10px;
    font-size:15px;
    color:white;
}

/* ========================= */
/* MOUSE SPARKLES */
/* ========================= */

.sparkle{

    position:fixed;

    width:8px;
    height:8px;

    border-radius:50%;

    pointer-events:none;

    animation:sparkleAnim 0.8s linear forwards;

    z-index:99999;

    mix-blend-mode:screen;
}

@keyframes sparkleAnim{

    0%{
        transform:scale(1) translateY(0);
        opacity:1;
    }

    100%{
        transform:scale(0) translateY(-25px);
        opacity:0;
    }

}

/* ========================= */
/* SCROLLBAR */
/* ========================= */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#00e5ff;
    border-radius:10px;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:768px){

    .container{
        width:95%;
        padding:20px;
    }

    .card{
        flex-direction:column;
        gap:15px;
    }

    .card h2{
        text-align:center;
    }

    .datetime-box{
        left:10px;
        top:10px;
        transform:none;
        width:180px;
    }

}

</style>
</head>

<script>

/* ========================= */
/* DIGITAL CLOCK */
/* ========================= */

function updateDateTime(){

    const now = new Date();

    const time =
    now.toLocaleTimeString('en-IN',{

        hour:'2-digit',
        minute:'2-digit',
        second:'2-digit',
        hour12:true

    });

    const date =
    now.toLocaleDateString('en-IN',{

        weekday:'long',
        year:'numeric',
        month:'long',
        day:'numeric'

    });

    document.getElementById(
        "digital-clock"
    ).innerText = time;

    document.getElementById(
        "digital-date"
    ).innerText = date;
}

setInterval(updateDateTime,1000);

updateDateTime();

/* ========================= */
/* OPEN LINKS */
/* ========================= */

function openLink(url){
    window.open(url,"_blank");
}

/* ========================= */
/* DISABLE SHORTCUTS */
/* ========================= */

document.addEventListener(
"keydown",
function(e){

    if(
        e.ctrlKey &&
        (
            e.key === 'c' ||
            e.key === 'u' ||
            e.key === 's'
        )
    ){
        e.preventDefault();
    }

});

/* ========================= */
/* REAL 3D TILT */
/* ========================= */

const container =
document.querySelector(".container");

document.addEventListener(
"mousemove",
(e)=>{

    const x =
    (window.innerWidth / 2 - e.pageX) / 28;

    const y =
    (window.innerHeight / 2 - e.pageY) / 28;

    container.style.transform =
    `
    rotateY(${x}deg)
    rotateX(${-y}deg)
    `;

});

/* Reset */

document.addEventListener(
"mouseleave",
()=>{

    container.style.transform =
    `
    rotateY(0deg)
    rotateX(0deg)
    `;

});

/* ========================= */
/* SPARKLE EFFECT */
/* ========================= */

document.addEventListener(
"mousemove",
function(e){

    const sparkle =
    document.createElement("div");

    sparkle.classList.add("sparkle");

    sparkle.style.left =
    e.clientX + "px";

    sparkle.style.top =
    e.clientY + "px";

    const size =
    Math.random() * 10 + 5;

    sparkle.style.width =
    size + "px";

    sparkle.style.height =
    size + "px";

    const colors = [

        "#00ffff",
        "#ff00ff",
        "#00ff99",
        "#ffffff",
        "#4facfe",
        "#00e1ff"

    ];

    const color =
    colors[Math.floor(
        Math.random() * colors.length
    )];

    sparkle.style.background =
    `radial-gradient(circle, ${color}, transparent)`;

    document.body.appendChild(sparkle);

    setTimeout(()=>{
        sparkle.remove();
    },800);

});

</script>
